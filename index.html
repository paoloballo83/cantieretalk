<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📐 Contabilità Cantiere</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0e; --surface: #1a1917; --surface2: #242320;
  --border: #2e2c28; --accent: #e8a020; --accent2: #f5c842;
  --text: #f0ede8; --text-muted: #7a7670; --text-soft: #b0aba3;
  --green: #27ae60; --danger: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
.header-sub { font-size: 11px; color: var(--text-muted); }
.totale-badge { background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px; padding: 4px 12px; border-radius: 20px; }
.cantiere-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto; white-space: nowrap; }
.cantiere-tab { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text-soft); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 6px 14px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
.cantiere-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
.cantiere-add { background: none; border: 2px dashed var(--border); border-radius: 20px; color: var(--text-muted); font-size: 20px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cantiere-info { font-size: 12px; color: var(--text-muted); padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; }
.cantiere-del { background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; }
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin: 12px; padding: 16px; }
.form-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
.field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; padding: 10px 12px; outline: none; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: var(--accent); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.calc-box { background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-weight: 600; color: var(--accent2); text-align: center; margin: 8px 0; }
.mic-btn { width: 100%; background: var(--surface2); border: 2px dashed var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0; }
.mic-btn.active { background: rgba(192,57,43,0.15); border-color: var(--danger); color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.foto-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.foto-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
.foto-add { width: 70px; height: 70px; border: 2px dashed var(--border); border-radius: 8px; background: none; color: var(--text-muted); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-primary { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 8px; }
.voci-section { margin: 0 12px; }
.voci-header { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 8px; }
.voci-header h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; }
.export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.export-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-soft); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 10px; cursor: pointer; text-align: center; }
.voce-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.voce-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.voce-num { background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }
.voce-desc { flex: 1; font-size: 14px; font-weight: 600; }
.voce-del { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }
.voce-misure { display: flex; flex-wrap: wrap; gap: 8px; font-size: 13px; color: var(--text-soft); }
.chip { background: var(--surface2); border-radius: 4px; padding: 2px 8px; }
.importo { color: var(--accent2); font-weight: 700; font-size: 14px; }
.voce-note { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 6px; border-left: 2px solid var(--border); padding-left: 8px; }
.voce-foto { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.voce-foto img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
.lightbox-close { position: fixed; top: 16px; right: 16px; color: #fff; font-size: 32px; cursor: pointer; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #fff; font-size: 14px; font-weight: 600; padding: 12px 24px; border-radius: 24px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.voice-feedback { background: rgba(192,57,43,0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text-soft); margin: 8px 0; display: none; }
.voice-feedback.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">📐 Contabilità Cantiere</div>
    <div class="header-sub" id="headerDate"></div>
  </div>
  <div class="totale-badge" id="totaleBadge">€ 0,00</div>
</div>

<div class="cantiere-bar" id="cantiereTabs"></div>
<div class="cantiere-info">
  <span id="cantiereLabel">📍 Cantiere attivo</span>
  <button class="cantiere-del" onclick="eliminaCantiere()">🗑 Elimina cantiere</button>
</div>

<div class="form-card">
  <div class="form-title">➕ Nuova Voce</div>

  <div class="field">
    <label>Descrizione lavorazione</label>
    <input type="text" id="fDesc" placeholder="Es: Intonaco civile parete nord...">
  </div>
  <button class="mic-btn" id="micBtnDesc" onclick="toggleVoceDesc()">
    🎤 <span id="micLabelDesc">Di' la descrizione con la voce</span>
  </button>

  <div class="grid2">
    <div class="field">
      <label>U.M.</label>
      <select id="fUm" onchange="calcola()">
        <option>m²</option><option>m³</option><option>m</option>
        <option>cad</option><option>kg</option><option>t</option><option>ore</option>
      </select>
    </div>
    <div class="field">
      <label>Ripetizioni</label>
      <input type="number" id="fRip" value="1" min="1" oninput="calcola()">
    </div>
  </div>
  <div class="grid3">
    <div class="field"><label>L (m)</label><input type="number" id="fL" step="0.01" placeholder="0.00" oninput="calcola()"></div>
    <div class="field"><label>La (m)</label><input type="number" id="fLa" step="0.01" placeholder="0.00" oninput="calcola()"></div>
    <div class="field"><label>A/P (m)</label><input type="number" id="fA" step="0.01" placeholder="0.00" oninput="calcola()"></div>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleVoce()">
    📏 <span id="micLabel">Di' le misure con la voce</span>
  </button>
  <div class="voice-feedback" id="voiceFeedback"></div>
  <div class="calc-box" id="calcBox">📏 Quantità: —</div>

  <div class="field"><label>Prezzo unitario (€)</label><input type="number" id="fPrezzo" step="0.01" placeholder="0.00" oninput="calcola()"></div>
  <div class="field"><label>Note / Appunti</label><input type="text" id="fNote" placeholder="Note, riferimenti, osservazioni..."></div>
  <div class="field">
    <label>📷 Foto</label>
    <div class="foto-row" id="fotoPreview">
      <button class="foto-add" onclick="document.getElementById('fotoInput').click()">+</button>
    </div>
  <input type="file" id="fotoInput" accept="image/*" capture="environment" multiple style="display:none" onchange="aggiungiPhoto(event)">
  </div>
  <button class="btn-primary" onclick="aggiungiVoce()">✓ Aggiungi Voce</button>
</div>

<div class="voci-section">
  <div class="voci-header"><h2>📋 Voci (<span id="voceCount">0</span>)</h2></div>
  <div class="export-row">
    <button class="export-btn" onclick="exportExcel()">📊 Excel</button>
    <button class="export-btn" onclick="exportPDF()">📄 PDF</button>
    <button class="export-btn" onclick="backupJSON()">💾 Backup</button>
    <button class="export-btn" onclick="document.getElementById('ripristinaInput').click()" style="color:var(--accent)">📂 Ripristina</button>
  </div>
  <input type="file" id="ripristinaInput" accept=".json" style="display:none" onchange="ripristinaJSON(event)">
  <div id="vociList"><div class="empty-state">Nessuna voce inserita.<br>Compila il modulo sopra 👆</div></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script>
let voci=[], fotoTemp=[], recognition=null, isListening=false, recognitionDesc=null;
let cantieri={}, cantiereAttivo=null;

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
initCantieri();

function initCantieri() {
  try { const r=localStorage.getItem('cantieretalk_v2'); if(r) cantieri=JSON.parse(r); } catch(e){}
  if(!Object.keys(cantieri).length) nuovoCantiere('Cantiere 1',false);
  else { cantiereAttivo=Object.keys(cantieri)[0]; voci=cantieri[cantiereAttivo].voci||[]; }
  renderTabs(); renderVoci();
}

function nuovoCantiere(nome,chiedi=true) {
  if(chiedi){nome=prompt('Nome cantiere:','Cantiere '+(Object.keys(cantieri).length+1));if(!nome)return;}
  const id='c_'+Date.now();
  cantieri[id]={nome:nome.trim(),voci:[]};
  cantiereAttivo=id; voci=[];
  salva(); renderTabs(); renderVoci();
  showToast('🏗 "'+nome+'" creato!');
}

function switchCantiere(id) {
  if(cantiereAttivo) cantieri[cantiereAttivo].voci=[...voci];
  cantiereAttivo=id; voci=cantieri[id].voci||[];
  salva(); renderTabs(); renderVoci();
}

function eliminaCantiere() {
  if(Object.keys(cantieri).length<=1){showToast('⚠️ Almeno un cantiere!');return;}
  const nome=cantieri[cantiereAttivo].nome;
  if(!confirm('Eliminare "'+nome+'"?'))return;
  delete cantieri[cantiereAttivo];
  cantiereAttivo=Object.keys(cantieri)[0];
  voci=cantieri[cantiereAttivo].voci||[];
  salva(); renderTabs(); renderVoci();
  showToast('🗑 Cantiere eliminato');
}

function renderTabs() {
  document.getElementById('cantiereTabs').innerHTML=
    Object.entries(cantieri).map(([id,c])=>
      `<button class="cantiere-tab ${id===cantiereAttivo?'active':''}" onclick="switchCantiere('${id}')">${c.nome}</button>`
    ).join('')+`<button class="cantiere-add" onclick="nuovoCantiere()" title="Nuovo">+</button>`;
  document.getElementById('cantiereLabel').textContent='📍 '+(cantiereAttivo&&cantieri[cantiereAttivo]?cantieri[cantiereAttivo].nome:'');
}

function salva() {
  if(cantiereAttivo) cantieri[cantiereAttivo].voci=[...voci];
  try{localStorage.setItem('cantieretalk_v2',JSON.stringify(cantieri));}catch(e){}
}

function calcola() {
  const l=parseFloat(document.getElementById('fL').value)||0;
  const la=parseFloat(document.getElementById('fLa').value)||0;
  const a=parseFloat(document.getElementById('fA').value)||0;
  const r=parseFloat(document.getElementById('fRip').value)||1;
  const um=document.getElementById('fUm').value;
  const p=parseFloat(document.getElementById('fPrezzo').value)||0;
  let q=0;
  if(um==='m²') q=l*(la||a||1)*r;
  else if(um==='m³') q=l*la*a*r;
  else if(um==='m') q=l*r;
  else q=r;
  const imp=q*p;
  document.getElementById('calcBox').textContent=q>0?`📏 ${q.toFixed(2)} ${um}`+(imp>0?` → € ${imp.toFixed(2)}`:''):'📏 Quantità: —';
  return {q,imp};
}

function aggiungiPhoto(event) {
  Array.from(event.target.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      fotoTemp.push(e.target.result);
      const img=document.createElement('img');
      img.src=e.target.result; img.className='foto-thumb';
      img.onclick=()=>openLightbox(e.target.result);
      document.getElementById('fotoPreview').insertBefore(img,document.getElementById('fotoPreview').querySelector('.foto-add'));
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

function aggiungiVoce() {
  const desc=document.getElementById('fDesc').value.trim();
  if(!desc){showToast('⚠️ Inserisci descrizione!');return;}
  const {q,imp}=calcola();
  voci.push({
    id:Date.now(), desc,
    um:document.getElementById('fUm').value,
    l:parseFloat(document.getElementById('fL').value)||0,
    la:parseFloat(document.getElementById('fLa').value)||0,
    a:parseFloat(document.getElementById('fA').value)||0,
    r:parseFloat(document.getElementById('fRip').value)||1,
    q, prezzo:parseFloat(document.getElementById('fPrezzo').value)||0,
    importo:imp, note:document.getElementById('fNote').value.trim(),
    foto:[...fotoTemp], data:new Date().toLocaleDateString('it-IT')
  });
  ['fDesc','fL','fLa','fA','fNote','fPrezzo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fRip').value='1';
  document.getElementById('calcBox').textContent='📏 Quantità: —';
  document.getElementById('fotoPreview').innerHTML='<button class="foto-add" onclick="document.getElementById(\'fotoInput\').click()">+</button>';
  fotoTemp=[];
  salva(); renderVoci(); showToast('✓ Voce aggiunta!');
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function renderVoci() {
  document.getElementById('voceCount').textContent=voci.length;
  const totale=voci.reduce((s,v)=>s+v.importo,0);
  document.getElementById('totaleBadge').textContent='€ '+totale.toLocaleString('it-IT',{minimumFractionDigits:2});
  const list=document.getElementById('vociList');
  if(!voci.length){list.innerHTML='<div class="empty-state">Nessuna voce.<br>Compila il modulo 👆</div>';return;}
  list.innerHTML=voci.map((v,i)=>`
    <div class="voce-card">
      <div class="voce-top">
        <span class="voce-num">#${i+1}</span>
        <span class="voce-desc">${esc(v.desc)}</span>
        <button class="voce-del" onclick="eliminaVoce(${v.id})">🗑</button>
      </div>
      <div class="voce-misure">
        ${v.l?`<span class="chip">L:${v.l}m</span>`:''}
        ${v.la?`<span class="chip">La:${v.la}m</span>`:''}
        ${v.a?`<span class="chip">A:${v.a}m</span>`:''}
        ${v.r>1?`<span class="chip">x${v.r}</span>`:''}
        <span class="chip">${v.q.toFixed(2)} ${v.um}</span>
        ${v.prezzo>0?`<span class="chip">€${v.prezzo.toFixed(2)}/um</span>`:''}
        ${v.importo>0?`<span class="importo">= € ${v.importo.toFixed(2)}</span>`:''}
      </div>
      ${v.note?`<div class="voce-note">${esc(v.note)}</div>`:''}
      ${v.foto.length?`<div class="voce-foto">${v.foto.map(f=>`<img src="${f}" onclick="openLightbox('${f}')">`).join('')}</div>`:''}
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${v.data}</div>
    </div>`).join('');
}

function eliminaVoce(id) {
  if(confirm('Eliminare?')){voci=voci.filter(v=>v.id!==id);salva();renderVoci();}
}

function exportExcel() {
  if(!voci.length){showToast('⚠️ Nessuna voce!');return;}
  const nm=cantieri[cantiereAttivo]?.nome||'cantiere';
  let csv='\uFEFFN°;Descrizione;UM;L;La;A;Rip;Qtà;P.Unit;Importo;Note;Data\n';
  voci.forEach((v,i)=>{csv+=`${i+1};"${v.desc}";${v.um};${v.l||''};${v.la||''};${v.a||''};${v.r};${v.q.toFixed(2)};${v.prezzo.toFixed(2)};${v.importo.toFixed(2)};"${v.note||''}";${v.data}\n`;});
  csv+=`;;;;;;;TOTALE;;${voci.reduce((s,v)=>s+v.importo,0).toFixed(2)};;\n`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=nm.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); showToast('📊 Excel scaricato!');
}

function exportPDF() {
  if(!voci.length){showToast('⚠️ Nessuna voce!');return;}
  const totale=voci.reduce((s,v)=>s+v.importo,0);
  const data=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});
  const nm=cantieri[cantiereAttivo]?.nome||'Cantiere';
  const righe=voci.map((v,i)=>`<tr><td>${i+1}</td><td>${v.desc}</td><td>${v.um}</td><td>${v.l||'-'}</td><td>${v.la||'-'}</td><td>${v.a||'-'}</td><td>${v.r}</td><td>${v.q.toFixed(2)}</td><td>${v.prezzo>0?'€'+v.prezzo.toFixed(2):'-'}</td><td style="color:#e8a020;font-weight:700;">${v.importo>0?'€'+v.importo.toFixed(2):'-'}</td><td>${v.note||''}</td></tr>${v.foto.length?`<tr><td colspan="11" style="padding:8px;background:#f9f9f9;"><div style="display:flex;gap:6px;">${v.foto.map(f=>`<img src="${f}" style="width:70px;height:70px;object-fit:cover;border-radius:4px;">`).join('')}</div></td></tr>`:''}`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${nm}</title><style>body{font-family:Arial;font-size:12px;margin:20px;}h1{font-size:18px;}table{width:100%;border-collapse:collapse;}th{background:#1a1917;color:#e8a020;padding:6px;font-size:11px;text-align:left;}td{padding:5px 6px;border-bottom:1px solid #eee;}.tot td{background:#1a1917;color:#f5c842;font-weight:800;}@media print{body{margin:5px;}}</style></head><body><h1>📐 ${nm}</h1><p style="color:#888;font-size:11px;">${data}</p><table><thead><tr><th>#</th><th>Descrizione</th><th>UM</th><th>L</th><th>La</th><th>A</th><th>Rip</th><th>Qtà</th><th>P.Unit</th><th>Importo</th><th>Note</th></tr></thead><tbody>${righe}</tbody><tfoot><tr class="tot"><td colspan="9" style="text-align:right;">TOTALE</td><td>€ ${totale.toLocaleString('it-IT',{minimumFractionDigits:2})}</td><td></td></tr></tfoot></table><script>window.onload=()=>window.print();<\/script></body></html>`);
  win.document.close(); showToast('📄 PDF!');
}

function backupJSON() {
  if(!voci.length){showToast('⚠️ Nessuna voce!');return;}
  const nm=cantieri[cantiereAttivo]?.nome||'cantiere';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({cantiere:nm,data:new Date().toLocaleDateString('it-IT'),voci},null,2)],{type:'application/json'}));
  a.download='backup_'+nm.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); showToast('💾 Backup!');
}

function ripristinaJSON(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.voci&&Array.isArray(d.voci)){voci=d.voci;salva();renderVoci();showToast('✅ Ripristinati '+voci.length+' voci!');}}catch(e){showToast('❌ File non valido!');}};
  reader.readAsText(file); event.target.value='';
}

// ── VOCE DESCRIZIONE ─────────────────────────────
function toggleVoceDesc() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('⚠️ Usa Chrome');return;}
  const btn=document.getElementById('micBtnDesc');
  const lbl=document.getElementById('micLabelDesc');
  if(recognitionDesc){recognitionDesc.stop();recognitionDesc=null;btn.classList.remove('active');lbl.textContent='🎤 Di\' la descrizione con la voce';return;}
  recognitionDesc=new SR(); recognitionDesc.lang='it-IT'; recognitionDesc.continuous=false; recognitionDesc.interimResults=true;
  recognitionDesc.onstart=()=>{btn.classList.add('active');lbl.textContent='⏹ In ascolto... parla!';};
  recognitionDesc.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('fDesc').value=t;
    if(e.results[0].isFinal) showToast('🎤 Descrizione: "'+t+'"');
  };
  recognitionDesc.onend=()=>{recognitionDesc=null;btn.classList.remove('active');lbl.textContent='🎤 Di\' la descrizione con la voce';};
  recognitionDesc.onerror=()=>{recognitionDesc=null;btn.classList.remove('active');lbl.textContent='🎤 Di\' la descrizione con la voce';};
  recognitionDesc.start();
}

// ── VOCE MISURE ──────────────────────────────────
function toggleVoce(){isListening?stopVoce():startVoce();}

function startVoce() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('⚠️ Usa Chrome');return;}
  recognition=new SR(); recognition.lang='it-IT'; recognition.continuous=false; recognition.interimResults=true;
  recognition.onstart=()=>{isListening=true;document.getElementById('micBtn').classList.add('active');document.getElementById('micLabel').textContent='⏹ Tocca per fermare';document.getElementById('voiceFeedback').classList.add('show');document.getElementById('voiceFeedback').textContent='🎤 Dì: "lunghezza 5 virgola 50, larghezza 3, altezza 2"';};
  recognition.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join(' ').toLowerCase();document.getElementById('voiceFeedback').textContent='📝 "'+t+'"';if(e.results[0].isFinal)parsaMisure(t);};
  recognition.onerror=()=>stopVoce(); recognition.onend=()=>{if(isListening)stopVoce();};
  recognition.start();
}

function stopVoce() {
  isListening=false; if(recognition)recognition.stop();
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micLabel').textContent='📏 Di\' le misure con la voce';
  setTimeout(()=>document.getElementById('voiceFeedback').classList.remove('show'),3000);
}

function parsaMisure(t) {
  t=t.replace(/virgola/g,'.').replace(/punto/g,'.').replace(/zero/g,'0').replace(/uno/g,'1').replace(/due/g,'2').replace(/tre/g,'3').replace(/quattro/g,'4').replace(/cinque/g,'5').replace(/sei/g,'6').replace(/sette/g,'7').replace(/otto/g,'8').replace(/nove/g,'9').replace(/dieci/g,'10').replace(/venti/g,'20').replace(/trenta/g,'30').replace(/quaranta/g,'40').replace(/cinquanta/g,'50').replace(/sessanta/g,'60').replace(/settanta/g,'70').replace(/ottanta/g,'80').replace(/novanta/g,'90').replace(/,/g,'.');
  let trovato={};
  [['lunghezza|lung','fL'],['larghezza|larg','fLa'],['altezza|alt|profondità|prof','fA'],['ripetizioni|volte','fRip']].forEach(([k,f])=>{const m=t.match(new RegExp('(?:'+k+')\\s*([\\d]+(?:\\.\\d+)?)','i'));if(m)trovato[f]=parseFloat(m[1]);});
  if(!Object.keys(trovato).length){const n=t.match(/\d+(?:\.\d+)?/g);if(n)['fL','fLa','fA'].forEach((f,i)=>{if(n[i])trovato[f]=parseFloat(n[i]);});}
  if(!Object.keys(trovato).length){document.getElementById('voiceFeedback').textContent='⚠️ Non capito. Riprova: "lunghezza 5, larghezza 3"';return;}
  Object.entries(trovato).forEach(([id,val])=>document.getElementById(id).value=val);
  calcola(); showToast('🎤 Misure inserite!');
}

function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
